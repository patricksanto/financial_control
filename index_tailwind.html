            const totalSpent = Math.abs(totalExpenses);
            const remaining = totalBudget - totalSpent;
            const percentUsed = (totalSpent / totalBudget * 100).toFixed(1);
            
            // Análise narrativa
            let narrativeHTML = '';
            if (monthlyAnalysis[currentMonth]) {
                const paragraphs = monthlyAnalysis[currentMonth].narrative.split('|');
                narrativeHTML = `
                    <div class="mb-8 overflow-hidden rounded-lg bg-white shadow">
                        <div class="bg-gradient-to-r from-emerald-500 to-teal-600 px-6 py-5">
                            <h3 class="text-lg font-semibold text-white">📊 Análise do Mês</h3>
                        </div>
                        <div class="px-6 py-5 space-y-3">
                            ${paragraphs.map(p => `<p class="text-sm text-gray-700 leading-relaxed">${p}</p>`).join('')}
                        </div>
                    </div>
                `;
            }

            // Stats cards
            const statsHTML = `
                <dl class="mb-8 grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-5">
                    <div class="overflow-hidden rounded-lg bg-white px-4 py-5 shadow sm:p-6">
                        <dt class="truncate text-sm font-medium text-gray-500">Receitas</dt>
                        <dd class="mt-1 text-3xl font-semibold tracking-tight text-green-600">${formatCurrency(totalIncome)}</dd>
                    </div>
                    <div class="overflow-hidden rounded-lg bg-white px-4 py-5 shadow sm:p-6">
                        <dt class="truncate text-sm font-medium text-gray-500">Despesas</dt>
                        <dd class="mt-1 text-3xl font-semibold tracking-tight text-red-600">${formatCurrency(totalExpenses)}</dd>
                    </div>
                    <div class="overflow-hidden rounded-lg bg-white px-4 py-5 shadow sm:p-6">
                        <dt class="truncate text-sm font-medium text-gray-500">Saldo</dt>
                        <dd class="mt-1 text-3xl font-semibold tracking-tight ${balance >= 0 ? 'text-emerald-600' : 'text-red-600'}">
                            ${balance >= 0 ? '+' : ''}${formatCurrency(balance)}
                        </dd>
                    </div>
                    <div class="overflow-hidden rounded-lg bg-white px-4 py-5 shadow sm:p-6">
                        <dt class="truncate text-sm font-medium text-gray-500">Orçamento</dt>
                        <dd class="mt-1 text-3xl font-semibold tracking-tight text-gray-900">€ ${totalBudget.toFixed(2).replace('.', ',')}</dd>
                    </div>
                    <div class="overflow-hidden rounded-lg bg-white px-4 py-5 shadow sm:p-6">
                        <dt class="truncate text-sm font-medium text-gray-500">Restante</dt>
                        <dd class="mt-1 text-3xl font-semibold tracking-tight ${remaining >= 0 ? 'text-green-600' : 'text-red-600'}">
                            ${remaining >= 0 ? '' : '-'}€ ${Math.abs(remaining).toFixed(2).replace('.', ',')}
                        </dd>
                        <dd class="mt-1 text-xs text-gray-500">${percentUsed}% usado</dd>
                    </div>
                </dl>
            `;

            // Charts
            const expenseCategories = sortedCategories.filter(([cat, data]) => data.total < 0);
            const chartsHTML = `
                <div class="mb-8 grid grid-cols-1 gap-5 lg:grid-cols-2">
                    <div class="overflow-hidden rounded-lg bg-white shadow">
                        <div class="px-6 py-5">
                            <h3 class="text-base font-semibold text-gray-900">📊 Despesas por Categoria</h3>
                            <div class="mt-4" style="height: 300px;">
                                <canvas id="expensesChart"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="overflow-hidden rounded-lg bg-white shadow">
                        <div class="px-6 py-5">
                            <h3 class="text-base font-semibold text-gray-900">🥧 Distribuição de Gastos</h3>
                            <div class="mt-4" style="height: 300px;">
                                <canvas id="pieChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mb-8 overflow-hidden rounded-lg bg-white shadow">
                    <div class="px-6 py-5">
                        <h3 class="text-base font-semibold text-gray-900">💰 Orçado vs Real</h3>
                        <div class="mt-4" style="height: 300px;">
                            <canvas id="budgetChart"></canvas>
                        </div>
                    </div>
                </div>
            `;

            // Categories list
            const categoriesHTML = `
                <div class="space-y-4">
                    ${sortedCategories.map(([category, data]) => {
                        const isPositive = data.total > 0;
                        let budgetBadge = '';
                        
                        if (budget.monthly_budget[category] && !isPositive) {
                            const budgeted = budget.monthly_budget[category];
                            const spent = Math.abs(data.total);
                            const percent = (spent / budgeted * 100).toFixed(0);
                            const diff = budgeted - spent;
                            const badgeClass = getBadgeClass(percent);
                            const text = percent >= 100 
                                ? `${percent}% (€${Math.abs(diff).toFixed(0)} acima)`
                                : `${percent}% (€${diff.toFixed(0)} restante)`;
                            
                            budgetBadge = `<span class="ml-2 inline-flex items-center rounded-full ${badgeClass} px-2.5 py-0.5 text-xs font-medium">${text}</span>`;
                        }
                        
                        return `
                            <div class="overflow-hidden rounded-lg bg-white shadow transition-all hover:shadow-md">
                                <button onclick="toggleCategory(this)" class="w-full px-6 py-4 text-left hover:bg-gray-50">
                                    <div class="flex items-center justify-between">
                                        <div class="flex items-center">
                                            <h3 class="text-sm font-semibold text-gray-900">${category}</h3>
                                            <span class="ml-2 text-sm text-gray-500">(${data.transactions.length})</span>
                                            ${budgetBadge}
                                        </div>
                                        <div class="flex items-center gap-3">
                                            <span class="text-lg font-bold ${isPositive ? 'text-green-600' : 'text-red-600'}">
                                                ${isPositive ? '+' : ''}${formatCurrency(data.total)}
                                            </span>
                                            <svg class="h-5 w-5 text-gray-400 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                                            </svg>
                                        </div>
                                    </div>
                                </button>
                                <div class="hidden bg-gray-50 px-6 py-4">
                                    <div class="space-y-3">
                                        ${data.transactions.map(t => `
                                            <div class="flex items-center justify-between border-b border-gray-200 pb-3 last:border-0 last:pb-0">
                                                <div class="flex items-center gap-4">
                                                    <span class="text-xs font-semibold text-gray-500">${formatDate(t.date)}</span>
                                                    <div>
                                                        <p class="text-sm font-medium text-gray-900">${t.name || 'N/A'}</p>
                                                        <p class="text-xs text-gray-500">${t.description}</p>
                                                    </div>
                                                </div>
                                                <span class="text-sm font-bold ${t.amount < 0 ? 'text-red-600' : 'text-green-600'}">
                                                    ${t.amount > 0 ? '+' : ''}${formatCurrency(t.amount)}
                                                </span>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;

            document.getElementById('content').innerHTML = statsHTML + narrativeHTML + chartsHTML + categoriesHTML;

            // Render charts
            const colors = ['#ef4444', '#f97316', '#f59e0b', '#eab308', '#84cc16', '#22c55e', '#10b981', '#14b8a6', '#06b6d4', '#0ea5e9', '#3b82f6', '#6366f1', '#8b5cf6', '#a855f7', '#d946ef'];
            const expenseLabels = expenseCategories.map(([cat]) => cat);
            const expenseValues = expenseCategories.map(([cat, data]) => Math.abs(data.total));
            
            charts.expenses = new Chart(document.getElementById('expensesChart'), {
                type: 'bar',
                data: {
                    labels: expenseLabels,
                    datasets: [{
                        data: expenseValues,
                        backgroundColor: colors,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
            
            charts.pie = new Chart(document.getElementById('pieChart'), {
                type: 'doughnut',
                data: {
                    labels: expenseLabels,
                    datasets: [{ data: expenseValues, backgroundColor: colors, borderWidth: 0 }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'right' } }
                }
            });

            const budgetLabels = [];
            const budgetedValues = [];
            const actualValues = [];
            
            expenseCategories.forEach(([cat, data]) => {
                if (budget.monthly_budget[cat]) {
                    budgetLabels.push(cat);
                    budgetedValues.push(budget.monthly_budget[cat]);
                    actualValues.push(Math.abs(data.total));
                }
            });
            
            charts.budget = new Chart(document.getElementById('budgetChart'), {
                type: 'bar',
                data: {
                    labels: budgetLabels,
                    datasets: [
                        { label: 'Orçado', data: budgetedValues, backgroundColor: '#94a3b8', borderRadius: 8 },
                        { label: 'Real', data: actualValues, backgroundColor: actualValues.map((val, i) => val > budgetedValues[i] ? '#ef4444' : '#10b981'), borderRadius: 8 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: true } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        function toggleCategory(button) {
            const details = button.nextElementSibling;
            const icon = button.querySelector('svg');
            details.classList.toggle('hidden');
            icon.classList.toggle('rotate-180');
        }

        function loadMonth(monthKey) {
            currentMonth = monthKey;
            document.querySelectorAll('.month-btn').forEach(btn => {
                btn.classList.toggle('bg-emerald-600', btn.dataset.month === monthKey);
                btn.classList.toggle('text-white', btn.dataset.month === monthKey);
                btn.classList.toggle('text-gray-700', btn.dataset.month !== monthKey);
                btn.classList.toggle('ring-gray-300', btn.dataset.month !== monthKey);
                btn.classList.toggle('ring-0', btn.dataset.month === monthKey);
            });
            renderData(months[monthKey].data, months[monthKey].label);
        }

        // Inicializar botões
        const monthButtonsContainer = document.getElementById('monthButtons');
        Object.entries(months).forEach(([key, data]) => {
            const btn = document.createElement('button');
            btn.className = 'month-btn inline-flex items-center rounded-md px-3 py-2 text-sm font-semibold shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 transition-colors';
            btn.textContent = data.label;
            btn.dataset.month = key;
            btn.onclick = () => loadMonth(key);
            monthButtonsContainer.appendChild(btn);
        });

        // Carregar mês mais recente
        const latestMonth = Object.keys(months).sort().reverse()[0];
        loadMonth(latestMonth);
    </script>
</body>
</html>
